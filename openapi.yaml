                                },
                                "image": {
                                    "description": "Image file for track creation. Required if `playlist_index` and `prompt` are not provided. If provided, `bpm` and `key` are not allowed. Supported formats: PNG, JPG, JPEG, WEBP, BMP. Size: 50 KB — 10 MB.",
                                    "type": "string",
                                    "format": "binary"
                                },
                                "bitrate": {
                                    "$ref": "#/components/schemas/TrackBitrateEnum"
                                },
                                "duration": {
                                    "description": "Duration of the track in seconds.",
                                    "type": "integer",
                                    "minimum": 5,
