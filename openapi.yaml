                                },
                                "mode": {
                                    "$ref": "#/components/schemas/TrackModeEnum"
                                },
                                "bpm": {
                                    "description": "Beats per minute (BPM). Can only be provided if `playlist_index` is specified. Not allowed if `prompt`, or `image` are used.",
